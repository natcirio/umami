
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.cal-wrap { padding: 1rem 0; }
.month-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.month-tabs button {
  font-family: var(--font-sans); font-size: 12px; padding: 5px 10px;
  border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md);
  background: var(--color-background-secondary); color: var(--color-text-secondary);
  cursor: pointer; transition: all .15s;
}
.month-tabs button.active {
  background: var(--color-background-primary); color: var(--color-text-primary);
  border-color: var(--color-border-primary); font-weight: 500;
}
.month-header { margin-bottom: 12px; }
.month-header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.month-header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.event-list { display: flex; flex-direction: column; gap: 8px; }
.event-card {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--color-background-secondary); border-radius: var(--border-radius-lg);
  border: 1px solid var(--color-border-tertiary); padding: 12px 14px;
}
.event-date {
  min-width: 44px; text-align: center; padding: 6px 4px;
  background: var(--color-background-primary); border-radius: var(--border-radius-md);
  border: 1px solid var(--color-border-tertiary);
}
.event-date .day { font-size: 18px; font-weight: 500; color: var(--color-text-primary); line-height: 1; }
.event-date .month-abbr { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .5px; }
.event-tag {
  display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px;
  font-weight: 500; margin-bottom: 4px;
}
.tag-uva { background: #EEEDFE; color: #3C3489; }
.tag-regiao { background: #E1F5EE; color: #085041; }
.tag-historia { background: #FAEEDA; color: #633806; }
.tag-filme { background: #FBEAF0; color: #72243E; }
.tag-brasil { background: #EAF3DE; color: #27500A; }
.tag-gastronomia { background: #FAECE7; color: #712B13; }
.tag-evento { background: #E6F1FB; color: #0C447C; }
.tag-enologia { background: #F1EFE8; color: #444441; }
.event-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
.event-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
.event-movable { font-size: 11px; color: var(--color-text-secondary); background: var(--color-background-primary); border: 1px dashed var(--color-border-secondary); border-radius: 6px; padding: 4px 8px; margin-top: 6px; display: inline-block; }
.dark .tag-uva { background: #26215C; color: #CECBF6; }
.dark .tag-regiao { background: #04342C; color: #9FE1CB; }
.dark .tag-historia { background: #412402; color: #FAC775; }
.dark .tag-filme { background: #4B1528; color: #F4C0D1; }
.dark .tag-brasil { background: #173404; color: #C0DD97; }
.dark .tag-gastronomia { background: #4A1B0C; color: #F5C4B3; }
.dark .tag-evento { background: #042C53; color: #B5D4F4; }
.dark .tag-enologia { background: #2C2C2A; color: #D3D1C7; }
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.legend-item { font-size: 11px; display: flex; align-items: center; gap: 4px; }
</style>

function tagHTML(type) {
  const [cls, label] = tags[type] || ['tag-enologia','🔬 Geral'];
  return `<span class="event-tag ${cls}">${label}</span>`;
}

function renderMonth(idx) {
  const m = months[idx];
  let html = `<div class="month-header"><h2>${m.name}</h2><p>${m.theme}</p></div>`;
  html += `<div class="event-list">`;
  for (const e of m.events) {
    html += `<div class="event-card">
      <div class="event-date"><div class="day">${e.day.length > 4 ? '—' : e.day}</div><div class="month-abbr">${m.abbr}</div></div>
      <div>
        ${tagHTML(e.tag)}
        <div class="event-title">${e.title}</div>
        <div class="event-desc">${e.desc}</div>
        ${e.movable ? `<div class="event-movable">📅 ${e.movable}</div>` : ''}
      </div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

let currentMonth = 0;
function render() {
  const root = document.getElementById('root');
  let tabs = `<div class="month-tabs">`;
  months.forEach((m, i) => {
    tabs += `<button class="${i===currentMonth?'active':''}" onclick="selectMonth(${i})">${m.abbr}</button>`;
  });
  tabs += `</div>`;
  
  const legend = `<div class="legend">
    ${Object.entries(tags).map(([k,[cls,l]])=>`<div class="legend-item"><span class="event-tag ${cls}" style="margin-bottom:0">${l}</span></div>`).join('')}
  </div>`;
  
  root.innerHTML = tabs + legend + renderMonth(currentMonth);
}

function selectMonth(i) { currentMonth = i; render(); }
render();
